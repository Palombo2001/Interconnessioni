<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Priscilla Palombo - Sfera Sinaptica (p5.js)</title>
  
  <!-- Carichiamo la libreria ufficiale p5.js tramite CDN sicuro -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.js"></script>
  
  <style>
    /* Styling del corpo pagina per renderlo immersivo e moderno */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background-color: #030712; /* Nero cosmico profondo */
      color: #f3f4f6;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
      padding: 20px;
    }

    .project-container {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(244, 63, 94, 0.15);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 40px rgba(236, 72, 153, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 500px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 16px;
      letter-spacing: 0.15em;
      color: #ffffff;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: #f43f5e; /* Rosa neon dell'opera */
      margin-bottom: 25px;
      text-transform: uppercase;
      font-weight: bold;
    }

    /* Container dove p5.js istanzierà il Canvas */
    #canvas-holder {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(51, 65, 85, 0.5);
      margin-bottom: 20px;
    }

    .info-footer {
      font-size: 8px;
      color: #64748b;
      margin-top: 10px;
      line-height: 1.4;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="project-container">
    <h1>Installazione Artistica Cognitiva</h1>
    <div class="subtitle">Didattica p5.js — Esame di Priscilla Palombo</div>
    
    <!-- Elemento in cui p5.js monta la tela grafica -->
    <div id="canvas-holder">
      <!-- Il canvas p5.js comparirà qui automaticamente -->
    </div>

    <div class="info-footer">
      Sviluppato in JavaScript + p5.js per Visual Studio Code.<br>
      © 2026 Priscilla Palombo. Tutti i diritti riservati.
    </div>
  </div>

  <!-- Colleghiamo il file sketch contenente il codice p5.js -->
  <script src="sketch.js"></script>
  
  <script>
    // Questo script aggiuntivo assicura che il canvas p5.js vada a posizionarsi
    // esattamente all'interno del nostro div con id "canvas-holder".
    function windowResized() {
      // Evento opzionale per gestire resize
    }
    
    // Forza il canvas p5.js ad innestarsi nel container personalizzato
    window.addEventListener('load', function() {
      let canvasElement = document.querySelector('canvas');
      if (canvasElement) {
        document.getElementById('canvas-holder').appendChild(canvasElement);
      }
    });
  </script>
</body>
</html>
